<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Pursuit of the Truth Reader">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6842"/>
      <stop offset="100%" stop-color="#5e4527"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf6e3"/>
      <stop offset="100%" stop-color="#ebdfc2"/>
    </linearGradient>
  </defs>
  <!-- Safe maskable zone: keep key art inside inner 80% -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Open book -->
  <g transform="translate(96 128)">
    <!-- Pages -->
    <path d="M0 32 Q160 0 160 48 L160 256 Q160 208 0 240 Z" fill="url(#page)" stroke="#4a3720" stroke-width="6" stroke-linejoin="round"/>
    <path d="M320 32 Q160 0 160 48 L160 256 Q160 208 320 240 Z" fill="url(#page)" stroke="#4a3720" stroke-width="6" stroke-linejoin="round"/>
    <!-- Spine -->
    <path d="M160 48 L160 256" stroke="#4a3720" stroke-width="6" stroke-linecap="round"/>
    <!-- Text lines -->
    <g stroke="#8a6842" stroke-width="6" stroke-linecap="round" opacity="0.55">
      <path d="M28 84 L132 72"/>
      <path d="M28 116 L132 104"/>
      <path d="M28 148 L112 138"/>
      <path d="M188 72 L292 84"/>
      <path d="M188 104 L292 116"/>
      <path d="M188 138 L272 148"/>
    </g>
  </g>
</svg>
